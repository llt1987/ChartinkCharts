<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accumulation Distribution Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #333;
    }
    header {
      background: #2c3e50;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    ol {
      list-style: decimal inside;
      padding: 20px;
    }
    li {
      margin-bottom: 20px;
    }
    .thumbnail {
      max-width: 300px;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .thumbnail:hover {
      transform: scale(1.05);
      border-color: #2c3e50;
    }
    footer {
      background: #2c3e50;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Accumulation Distribution Dashboard</h1>
    <p>Click thumbnails to view full charts</p>
  </header>

  <ol>
    <li>
      <strong>Smallcap Accumulation</strong><br>
      <a href="Smallcap_Sector_Accumulation_Distribution.png" target="_blank">
        <img src="Smallcap_Sector_Accumulation_Distribution.png" alt="Smallcap Chart" class="thumbnail">
      </a>
    </li>
    <li>
      <strong>Midcap Accumulation</strong><br>
      <a href="Midcap_Sector_Accumulation_Distribution.png" target="_blank">
        <img src="Midcap_Sector_Accumulation_Distribution.png" alt="Midcap Chart" class="thumbnail">
      </a>
    </li>
    <li>
      <strong>Sector Distribution</strong><br>
      <a href="Smallcap_vs_Midcap_Accumulation.png" target="_blank">
        <img src="Smallcap_vs_Midcap_Accumulation.png" alt="Smallcap vs Midcap Chart" class="thumbnail">
      </a>
    </li>
  </ol>

  <footer>
    <p>&copy; Copyright @LT 2026 | Built with Pandas & Matplotlib</p>
  </footer>
</body>
</html>
