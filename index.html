<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPulse • Live Indian Markets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
       
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .stock-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .stock-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
       
        .price-up { color: #22c55e; animation: priceUp 0.6s ease; }
        .price-down { color: #ef4444; animation: priceDown 0.6s ease; }
       
        @keyframes priceUp { 0% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes priceDown { 0% { transform: scale(0.92); } 100% { transform: scale(1); } }
       
        .live-dot { animation: pulse 2s infinite; }
        .ticker-content { display: inline-block; animation: ticker-slide 40s linear infinite; }
       
        @keyframes ticker-slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
       
        .tradingview-container {
            height: 420px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #27272a;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <!-- Top Navigation -->
    <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center text-white font-bold text-xl">LT</div>
                    <span class="font-bold text-2xl tracking-tighter">ChartinkCharts</span>
                </div>
               
                <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                    <a href="#" class="text-emerald-400 hover:text-emerald-300 transition-colors flex items-center gap-1">
                        <i class="fas fa-chart-line"></i> NSE Markets
                    </a>
                </div>
            </div>
           
            <div class="flex items-center gap-4">
                <div class="relative">
                    <input type="text" id="searchInput"
                           class="bg-zinc-800 border border-zinc-700 rounded-2xl py-2.5 px-5 pl-11 w-80 text-sm focus:outline-none focus:border-emerald-500"
                           placeholder="Search NSE symbol (e.g. RELIANCE, SBIN, NIFTY)">
                    <i class="fas fa-search absolute left-4 top-3 text-zinc-500"></i>
                </div>
               
                <div id="apiStatus" class="flex items-center gap-2 bg-zinc-800 rounded-2xl px-4 py-2 text-xs">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full live-dot"></div>
                    <span>Yahoo Finance • Live</span>
                </div>
               
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center hover:bg-zinc-800 rounded-2xl transition-colors">
                    <i id="themeIcon" class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </div>
       
        <!-- Live Ticker -->
        <div class="bg-zinc-900 border-t border-zinc-800 py-2 text-xs overflow-hidden">
            <div class="max-w-7xl mx-auto px-6 ticker">
                <div id="liveTicker" class="ticker-content flex items-center gap-8 text-emerald-400 font-mono"></div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Header with Title + Buttons -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter mb-1">Live Indian Market Overview</h1>
                <p class="text-zinc-400" id="currentTime">Loading...</p>
            </div>
            
            <div class="flex flex-col items-end gap-3">
                <!-- Refresh Button -->
                <button onclick="manualRefresh()" 
                        class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-3xl text-sm font-medium">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                
                <!-- Accumulation Link -->
                <a href="accumulation.html" 
                   class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-3xl text-sm font-medium text-white transition-colors w-full justify-center">
                    <i class="fas fa-table"></i> Accumulation
                </a>
                
                <!-- New Blog Link -->
                <a href="https://aaravtomar.blogspot.com/" 
                   target="_blank"
                   class="flex items-center gap-2 bg-zinc-700 hover:bg-zinc-600 px-6 py-3 rounded-3xl text-sm font-medium text-white transition-colors w-full justify-center">
                    <i class="fas fa-blog"></i> Blog
                </a>
            </div>
        </div>

        <!-- Major Indices -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="indicesGrid"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- TradingView Chart -->
            <div class="lg:col-span-8 bg-zinc-900 rounded-3xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <div id="mainSymbolDisplay" class="text-4xl font-bold">NIFTY</div>
                        <div id="mainPriceDisplay" class="text-4xl font-mono font-semibold">—</div>
                        <div id="mainChangeDisplay" class="text-2xl font-medium">—</div>
                    </div>
                   
                    <select id="symbolSelect" onchange="switchSymbol(this.value)"
                            class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
                        <option value="NIFTY">NIFTY 50</option>
                        <option value="BANKNIFTY">BANK NIFTY</option>
                        <option value="SENSEX">SENSEX</option>
                        <option value="RELIANCE">Reliance</option>
                        <option value="SBIN">SBIN</option>
                        <option value="HDFCBANK">HDFC Bank</option>
                        <option value="TCS">TCS</option>
                        <option value="INFY">Infosys</option>
                        <option value="ICICIBANK">ICICI Bank</option>
                    </select>
                </div>
               
                <div class="tradingview-container" id="tv-chart"></div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-8">
                <div class="bg-zinc-900 rounded-3xl p-7">
                    <h3 class="font-semibold text-lg mb-6 flex items-center gap-2">
                        <i class="fas fa-arrow-trend-up text-emerald-400"></i> Top Movers
                    </h3>
                    <div id="moversList" class="space-y-6"></div>
                </div>
            </div>
        </div>

        <!-- Watchlist -->
        <div class="mt-16">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold">Watchlist</h2>
                <button onclick="addToWatchlist()" 
                        class="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 text-sm font-medium">
                    <i class="fas fa-plus"></i> Add Symbol
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="watchlistGrid"></div>
        </div>
    </div>

    <footer class="bg-zinc-950 border-t border-zinc-800 py-12 mt-20 text-center text-xs text-zinc-500">
        <p>MarketPulse • TradingView Charts + Yahoo Finance Live Ticker (Free)</p>
        <p class="mt-1">Copyright © LT 2026 • Delhi, India</p>
    </footer>

    <script>
        let priceCache = {};
        let watchlistSymbols = ["RELIANCE", "SBIN", "HDFCBANK", "TCS", "INFY", "ICICIBANK", "BHARTIARTL"];
        let currentMainSymbol = "NIFTY";
        let tickerInterval = null;

        // ================== TRADINGVIEW ==================
        function initTradingView(symbol) {
            const container = document.getElementById('tv-chart');
            container.innerHTML = '';
            currentMainSymbol = symbol;

            let tvSymbol = `NSE:${symbol}`;
            if (symbol === "NIFTY") tvSymbol = "NSE:NIFTY";
            else if (symbol === "BANKNIFTY") tvSymbol = "NSE:BANKNIFTY";
            else if (symbol === "SENSEX") tvSymbol = "BSE:SENSEX";

            new TradingView.widget({
                "container_id": "tv-chart",
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "5",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#18181b",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "studies": ["MACD@tv-basicstudies", "RSI@tv-basicstudies"]
            });
        }

        // ================== YAHOO FINANCE ==================
        async function fetchQuote(symbol) {
            try {
                let ySymbol = symbol === "NIFTY" ? "^NSEI" : 
                             symbol === "BANKNIFTY" ? "^NSEBANK" : 
                             symbol === "SENSEX" ? "^BSESN" : `${symbol}.NS`;

                const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ySymbol}?interval=1m&range=1d`);
                if (!res.ok) return null;

                const data = await res.json();
                const result = data.chart.result[0];
                if (!result) return null;

                const meta = result.meta;
                const price = meta.regularMarketPrice || meta.previousClose || 0;
                const prevClose = meta.previousClose || price;
                const change = price - prevClose;
                const percent = prevClose ? (change / prevClose) * 100 : 0;

                return {
                    price: parseFloat(price.toFixed(2)),
                    percent: parseFloat(percent.toFixed(2))
                };
            } catch (e) {
                console.error("Yahoo fetch failed for", symbol);
                return null;
            }
        }

        // ================== LIVE TICKER ==================
        async function updateLiveTicker() {
            const tickerEl = document.getElementById('liveTicker');
            let html = '';

            for (let sym of ["NIFTY", "BANKNIFTY", "RELIANCE", "SBIN", "HDFCBANK", "TCS"]) {
                const quote = await fetchQuote(sym);
                if (quote) {
                    priceCache[sym] = quote;
                    const isUp = quote.percent >= 0;
                    html += `<span class="mr-16">${sym} ₹${quote.price} <span class="${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? '+' : ''}${quote.percent}%</span></span>`;
                } else {
                    html += `<span class="mr-16">${sym} —</span>`;
                }
            }
            tickerEl.innerHTML = html + html;
        }

        function startLiveTicker() {
            updateLiveTicker();
            if (tickerInterval) clearInterval(tickerInterval);
            tickerInterval = setInterval(updateLiveTicker, 8000);
        }

        // ================== RENDER FUNCTIONS ==================
        async function renderWatchlist() {
            const container = document.getElementById('watchlistGrid');
            container.innerHTML = '';
           
            for (const sym of watchlistSymbols) {
                const cached = priceCache[sym];
                const isUp = cached && cached.percent >= 0;
               
                const div = document.createElement('div');
                div.className = `bg-zinc-900 rounded-3xl p-6 stock-card`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-bold text-lg">${sym}</div>
                            <div class="text-xs text-emerald-400">Yahoo Finance</div>
                        </div>
                        <div class="text-right">
                            <div class="font-mono text-2xl font-semibold">${cached ? '₹' + cached.price : '—'}</div>
                            <div class="${isUp ? 'price-up' : 'price-down'} text-sm font-medium">
                                ${cached ? (isUp ? '+' : '') + cached.percent + '%' : '—'}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        async function renderMovers() {
            const container = document.getElementById('moversList');
            container.innerHTML = '';
            const samples = ["RELIANCE", "SBIN", "HDFCBANK"];
            for (const sym of samples) {
                const cached = priceCache[sym] || await fetchQuote(sym);
                if (!cached) continue;
                const isUp = cached.percent >= 0;
                const el = document.createElement('div');
                el.className = 'flex justify-between items-center stock-card py-3';
                el.innerHTML = `
                    <div class="font-semibold">${sym}</div>
                    <div class="text-right">
                        <div class="font-mono">₹${cached.price}</div>
                        <div class="${isUp ? 'text-emerald-400' : 'text-red-400'} text-sm">
                            ${isUp ? '+' : ''}${cached.percent}%
                        </div>
                    </div>
                `;
                container.appendChild(el);
            }
        }

        function renderIndices() {
            const container = document.getElementById('indicesGrid');
            container.innerHTML = `
                <div class="bg-zinc-900 rounded-3xl p-6 stock-card">
                    <div class="font-medium">NIFTY 50</div>
                    <div class="font-mono text-3xl mt-4 text-emerald-400">—</div>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-6 stock-card">
                    <div class="font-medium">BANK NIFTY</div>
                    <div class="font-mono text-3xl mt-4">—</div>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-6 stock-card">
                    <div class="font-medium">SENSEX</div>
                    <div class="font-mono text-3xl mt-4">—</div>
                </div>
            `;
        }

        // ================== SYMBOL SWITCH ==================
        async function switchSymbol(symbol) {
            initTradingView(symbol);
            const quote = priceCache[symbol] || await fetchQuote(symbol);
            if (quote) {
                priceCache[symbol] = quote;
                document.getElementById('mainPriceDisplay').textContent = quote.price;
                const chEl = document.getElementById('mainChangeDisplay');
                const isUp = quote.percent >= 0;
                chEl.textContent = `${isUp ? '+' : ''}${quote.percent}%`;
                chEl.className = `text-2xl font-medium ${isUp ? 'price-up' : 'price-down'}`;
            }
        }

        function manualRefresh() {
            renderWatchlist();
            renderMovers();
            fetchQuote(currentMainSymbol).then(q => {
                if (q) {
                    priceCache[currentMainSymbol] = q;
                    document.getElementById('mainPriceDisplay').textContent = q.price;
                    const chEl = document.getElementById('mainChangeDisplay');
                    const isUp = q.percent >= 0;
                    chEl.textContent = `${isUp ? '+' : ''}${q.percent}%`;
                    chEl.className = `text-2xl font-medium ${isUp ? 'price-up' : 'price-down'}`;
                }
            });
        }

        function addToWatchlist() {
            let sym = prompt("Enter NSE Symbol (e.g. RELIANCE, SBIN, LT):");
            if (sym) {
                sym = sym.trim().toUpperCase();
                if (!watchlistSymbols.includes(sym)) {
                    watchlistSymbols.push(sym);
                    renderWatchlist();
                }
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('light');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function updateTime() {
            const el = document.getElementById('currentTime');
            setInterval(() => {
                const now = new Date();
                el.textContent = now.toLocaleString('en-IN', {
                    weekday: 'long', month: 'short', day: 'numeric', 
                    hour: '2-digit', minute: '2-digit'
                }) + " IST • Yahoo Finance";
            }, 15000);
        }

        // Search
        document.getElementById('searchInput').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                let q = e.target.value.trim().toUpperCase();
                if (q) {
                    await switchSymbol(q);
                    e.target.value = '';
                }
            }
        });

        // ================== INITIALIZE ==================
        async function initializeDashboard() {
            renderIndices();
            updateTime();
            initTradingView("NIFTY");
            
            await renderWatchlist();
            await renderMovers();

            startLiveTicker();

            console.log("%c✅ MarketPulse Ready! Live Ticker + TradingView Charts", "color:#22c55e");
        }

        window.onload = initializeDashboard;
    </script>
</body>
</html>
